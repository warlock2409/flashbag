<h2 mat-dialog-title class="bg-white" style="margin: 0;">{{ isEditMode ? 'Edit Customer' : (isExportCustomerMode ? 'Import Customer' : 'Add Customer') }}
</h2>

<mat-dialog-content class="mat-typography bg-white">
    <form [formGroup]="customerForm" (ngSubmit)="submitAccountForm()" class="p-4">
        <!-- Grid layout for export mode, stacked for regular mode -->
        <div [ngClass]="isExportCustomerMode ? 'grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6' : 'flex flex-col gap-4'">

            <!-- Left column / Full width in regular mode -->
            <div [ngClass]="isExportCustomerMode ? 'md:col-span-1 flex flex-col gap-3 md:gap-4' : 'flex flex-col gap-3 md:gap-4'">
                <!-- Name -->
                <div class="form-field">
                    <label class="block mb-1 md:mb-2 text-sm font-medium">Customer Name</label>
                    <input type="text" autocomplete="off" formControlName="name"
                        class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5" />
                </div>

                <!-- Existing Customer ID -->
                <div class="form-field">
                    <label class="block mb-1 md:mb-2 text-sm font-medium">Existing Customer ID</label>
                    <input type="text" autocomplete="off" formControlName="existingCustomerId"
                        (input)="allowOnlyNumbers($event, 'existingCustomerId')"
                        class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5"
                        placeholder="Enter existing customer ID (if applicable)" />
                </div>

                <!-- Membership Dropdown - Placed parallel to name in export mode -->
                <div class="form-field" *ngIf="isExportCustomerMode && !isEditMode">
                    <label class="block mb-1 md:mb-2 text-sm font-medium">Membership</label>
                    <mat-select formControlName="membershipId" placeholder="Select Membership" class="w-full">
                        <mat-option *ngFor="let membership of memberships" [value]="membership.id"
                            [title]="membership.name">
                            <div class="membership-option">
                                <span class="membership-price">{{ membership.durationLabel }}- ₹{{ membership.basePrice
                                    }}</span>
                                <span class="membership-name">- {{ membership.name }}</span>
                            </div>
                        </mat-option>
                    </mat-select>
                </div>

                <!-- Phone with Country Code -->
                <div class="form-field">
                    <label class="block mb-1 md:mb-2 text-sm font-medium">Phone number</label>
                    <div class="flex items-center gap-2">
                        <!-- Country Code Selector -->
                        <mat-select formControlName="countryCode" class="!w-16 md:!w-20">
                            <mat-option value="+91">+91</mat-option>
                            <mat-option value="+1">+1</mat-option>
                            <mat-option value="+44">+44</mat-option>
                            <mat-option value="+61">+61</mat-option>
                            <mat-option value="+81">+81</mat-option>
                        </mat-select>

                        <!-- Phone Number Input -->
                        <input type="tel" formControlName="phone" (input)="allowOnlyNumbers($event, 'phone')"
                            class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full flex-1 p-2.5"
                            [class.opacity-50]="isEditMode"
                            placeholder="Phone number" />
                    </div>
                </div>

                <!-- Email -->
                <div class="form-field">
                    <label class="block mb-1 md:mb-2 text-sm font-medium">Email address</label>
                    <input type="email" autocomplete="off" formControlName="email"
                        class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5"
                        [class.opacity-50]="isEditMode" />
                </div>

                <!-- Start Date -->
                <div class="form-field" *ngIf="isExportCustomerMode && !isEditMode">
                    <label class="block mb-1 md:mb-2 text-sm font-medium">Start Date</label>
                    <input type="date" formControlName="startDate"
                        class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5" />
                </div>
            </div>

            <!-- Right column - Only in export mode, not edit mode -->
            <div [ngClass]="isExportCustomerMode ? 'md:col-span-1 flex flex-col gap-3 md:gap-4' : 'flex flex-col gap-3 md:gap-4'" *ngIf="isExportCustomerMode && !isEditMode">
                <!-- Media Upload - Moved to bottom -->
                <div class="form-field">
                    <label class="block mb-1 md:mb-2 text-sm font-medium">Customer Media</label>
                    <app-upload-media [existingUploads]="sampleUploads" [multiple]="false" [type]="'CUSTOMER'"
                        (uploaded)="setDocument($event)" class="block w-full md:w-50"></app-upload-media>
                </div>
            </div>
        </div>
    </form>
</mat-dialog-content>

<mat-dialog-actions class="bg-white button-container">
    <button mat-stroked-button mat-dialog-close>Cancel</button>
    <button mat-stroked-button type="submit" (click)="submitAccountForm()"
        style="background-color: #a684ff; color: white;">{{ isEditMode ? 'Update' : (isExportCustomerMode ? 'Import' : 'Submit') }}</button>
</mat-dialog-actions>
