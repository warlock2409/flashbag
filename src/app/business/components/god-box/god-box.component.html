<div id="godBox" class="fixed inset-0 backdrop-blur-sm bg-black/20 flex items-center justify-center p-4 z-50">
    <div
        class="bg-violet-950/30 border-white/10 border rounded-2xl backdrop-blur-lg shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
        <!-- Dialog Header -->
        <div class="flex justify-between items-center border-b border-gray-200 py-3 px-4 mb-2">
            <p class="text-lg font-medium m-0 text-white ">God Box</p>
            <button (click)="closeDialog()" class="text-gray-400 hover:text-red-500">
                <mat-icon style="color: lightcoral;">cancel</mat-icon>
            </button>
        </div>

        <!-- Search Input -->
        <div class="p-4 border-gray-200">
            <input #searchInput type="text" [(ngModel)]="searchQuery" (input)="onSearchChange()" style="color: white;"
                placeholder="Search Customer..."
                class="w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-400 placeholder-white text-white" />
        </div>

        <!-- Content Section Split 30/70 -->
        <div class="flex flex-1 overflow-hidden p-2 md:p-4 min-h-[50vh] md:min-h-[500px]">
            <!-- Left Sidebar -->
            <div class="w-16 md:w-1/4 border-r border-gray-100 p-2 md:p-4 overflow-y-auto shrink-0 flex flex-col items-center md:items-stretch">
                <div class="flex flex-col space-y-2 gap-2 w-full">
                    <button *ngFor="let tab of tabs" (click)="selectedTab = tab" style="color: white;" [class]="
                        selectedTab === tab
                        ? 'bg-[#ededed29] p-2 md:px-3 md:py-2 rounded-lg flex items-center justify-center md:justify-start w-full'
                        : 'text-white p-2 md:px-3 md:py-2 rounded-lg hover:bg-[#ededed29] cursor-pointer flex items-center justify-center md:justify-start w-full'">
                        
                        <!-- Mobile Icon -->
                        <mat-icon class="md:hidden" [ngSwitch]="tab">
                            <ng-container *ngSwitchCase="'Customer'">person</ng-container>
                            <ng-container *ngSwitchCase="'Screens'">view_quilt</ng-container>
                            <ng-container *ngSwitchDefault>folder</ng-container>
                        </mat-icon>
                        
                        <!-- Desktop Text -->
                        <span class="hidden md:inline">{{ tab }}</span>
                    </button>
                </div>
            </div>

            <!-- Right Content -->
            <div class="flex-1 md:w-3/4 p-2 md:p-4 overflow-y-auto w-full">

                <!-- Screens (Horizontal Scroll) -->
                <!-- <div *ngIf="selectedTab === 'Screens'"
                    class="flex space-x-4 overflow-x-auto mt-2 pb-2 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:'none'] [scrollbar-width:'none']">
                    <div *ngFor="let screen of screens" class="border p-2 rounded-lg shadow-sm w-40 flex-shrink-0">
                        <h4 class="text-sm font-semibold mb-1">{{ screen.name }}</h4>
                        <img [src]="screen.preview" alt="{{ screen.name }}" class="w-full h-32 object-cover rounded" />
                    </div>
                </div> -->

                <!-- Other Tabs -->
                <div *ngIf="selectedTab === 'Customer'" class="text-gray-100 md:mt-4">
                    @for (customer of customers; track $index) {
                    <div class="flex flex-col md:flex-row md:justify-between md:items-center bg-[#71687f] rounded-lg p-3 md:p-2 mt-2 hover:bg-[#857c94] transition-colors cursor-pointer gap-2 md:gap-0" (click)="returnCustomer(customer)">
                        <div class="flex items-center gap-3">
                            <div class="customer-dp-wrapper godbox-dp shrink-0" (click)="customer.profileImage ? openImagePreview(customer.profileImage, $event) : null">
                                <img *ngIf="customer.profileImage" [src]="customer.profileImage" [alt]="customer.firstName">
                                <div *ngIf="!customer.profileImage" class="placeholder-dp">
                                  {{ getInitials(customer.firstName, customer.lastName) }}
                                </div>
                            </div>
                            <div class="flex flex-col overflow-hidden">
                                <p class="font-semibold text-white m-0 text-sm truncate">{{customer.firstName}} {{customer.lastName}}</p>
                                <div class="flex items-center gap-1 flex-wrap">
                                    <p class="text-purple-300 text-xs m-0">#{{customer.id}}</p>
                                    <p class="text-purple-400 text-xs m-0" *ngIf="customer.existingCustomerId">({{customer.existingCustomerId}})</p>
                                    <p class="text-purple-400 text-xs m-0" *ngIf="customer.existingId">({{customer.existingId}})</p>
                                </div>
                            </div>
                        </div>
                        <div class="text-left md:text-right pl-14 md:pl-0">
                            <p style="margin: 0;" class="text-purple-200 text-xs truncate">
                                {{customer.email}}
                            </p>
                            <p style="margin: 0;" class="text-purple-300 text-xs truncate">
                                {{customer.contactNumber}}
                            </p>
                        </div>
                    </div>
                    }
                </div>
            </div>
        </div>


    </div>
</div>
