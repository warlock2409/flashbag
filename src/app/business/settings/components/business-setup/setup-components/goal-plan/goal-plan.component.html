<div class="goal-plan-container p-6">
    <!-- Top Bar -->
    <header class="flex items-center justify-between gap-4">
        <div class="flex items-start gap-3">
            <div class="h-9 w-9 rounded-md bg-blue-200 ring-1 ring-inset ring-neutral-200 grid place-items-center mt-1">
                <span class="text-sm font-semibold tracking-tight text-blue-800">GL</span>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-semibold tracking-tight text-neutral-900 m-0">Goals</h1>
                <p class="text-xs text-neutral-600 m-0">Create and map exercises by day for member goals</p>
            </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
            <button mat-stroked-button (click)="openGoalAction()">
                <i class="fa-solid fa-plus mr-2"></i> Create Goal
            </button>
        </div>
    </header>

    <section class="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let goal of goals"
            class="border border-neutral-200 rounded-xl bg-white p-5 shadow-sm flex flex-col justify-between hover:shadow-md transition-shadow">
            <div>
                <h3 class="font-bold text-lg text-neutral-900">{{ goal.name }}</h3>
                <p class="text-neutral-600 text-sm mt-2 line-clamp-2 h-10">{{ goal.description }}</p>
                <div
                    class="mt-4 flex items-center text-xs font-medium text-blue-700 bg-blue-50 px-2.5 py-1 rounded-full w-fit">
                    <i class="fa-solid fa-calendar-day mr-1.5"></i> {{ goal.todos?.length || 0 }} Workout Days
                </div>
            </div>
            <div class="mt-6 flex justify-end">
                <button mat-stroked-button class="text-blue-600! font-medium" (click)="openGoalAction(goal)">
                    Edit
                </button>
            </div>
        </div>

        <div *ngIf="goals.length === 0 && !isLoading"
            class="col-span-full py-12 text-center text-neutral-500 border-2 border-dashed border-neutral-200 rounded-xl">
            No goals created yet. Click above to create one.
        </div>
        <div *ngIf="isLoading" class="col-span-full py-12 text-center text-neutral-500">
            Loading goals...
        </div>
    </section>
</div>
