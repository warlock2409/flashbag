<!-- Dialog Overlay -->
<div class="fixed inset-0 backdrop-blur-sm flex items-center justify-center p-4 z-50">

    <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col dialog-animate">

        <!-- Dialog Header -->
        <div class="flex justify-between items-center border-b border-gray-200 py-3 px-3">
            <h2 class="text-lg font-semibold text-gray-800 m-0">Holidays - {{ data.shop.name }}</h2>

            <button (click)="dialogRef.close()" class="text-gray-400 hover:text-red-500 cursor-pointer">
                <mat-icon style="color: lightcoral;">cancel</mat-icon>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="max-w-[800px] mx-auto">
                <!-- Loading Spinner -->
                <div *ngIf="loading" class="flex justify-center py-8">
                    <div class="flex flex-col items-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-600 mb-2"></div>
                        <p class="text-gray-500 text-sm">Loading holidays...</p>
                    </div>
                </div>

                <!-- Holiday list -->
                <nz-card nzType="inner" nzTitle="Scheduled Holidays" class="m-b-4" [nzExtra]="addTemplate">
                    <ng-template #addTemplate>
                        <button mat-raised-button style="background-color: #a684ff; color: white;"
                            (click)="addHoliday()">
                            <mat-icon>add</mat-icon> Add Holiday
                        </button>
                    </ng-template>

                    <div *ngIf="holidays.length === 0" class="text-center py-4 text-gray-500">
                        No holidays scheduled yet.
                    </div>

                    <div *ngFor="let holiday of holidays; let i = index"
                        class="flex flex-col sm:flex-row sm:items-center p-3 md:p-4 bg-gray-50 rounded mb-3 gap-4">
                        
                        <!-- Left side: Date and Info -->
                        <div class="flex items-center flex-1 gap-4">
                            <!-- Calendar date display -->
                            <div class="calendar-date w-12 text-center flex-none">
                                <div class="text-[10px] font-semibold text-gray-400 leading-none mb-1">{{ holiday.holidayDate | date:'MMM' | uppercase }}</div>
                                <div class="text-lg font-bold text-gray-800 leading-none">{{ holiday.holidayDate | date:'d' }}</div>
                                <div class="text-[10px] text-gray-400 leading-none mt-1">{{ holiday.holidayDate | date:'yy' }}</div>
                            </div>

                            <div class="flex-1">
                                <div class="font-medium text-gray-800">{{ holiday.name }}</div>
                                <div *ngIf="holiday.notify" class="inline-flex items-center text-[10px] text-blue-600 font-medium px-2 py-0.5 bg-blue-50 rounded mt-1">
                                    <mat-icon style="font-size: 12px; height: 12px; width: 12px; margin-right: 4px;">notifications_active</mat-icon>
                                    Notification ON
                                </div>
                            </div>
                        </div>

                        <!-- Right side: Actions -->
                        <div class="flex gap-2 justify-end sm:justify-start">
                            <button mat-raised-button class="edit-button text-sm px-4" (click)="editHoliday(holiday, i)">
                                Edit
                            </button>

                            <button mat-raised-button class="holidays-button text-sm px-4" (click)="removeHoliday(i)">
                                Delete
                            </button>
                        </div>
                    </div>
                </nz-card>
            </div>
        </div>
    </div>
</div>
