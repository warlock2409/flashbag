<div class="login-container">
    <!-- Artistic background elements -->
    <div class="artistic-background">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
        <div class="gradient-overlay"></div>
    </div>

    <!-- Login form container -->
    <div class="login-wrapper">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <div class="login-header">
                <div class="logo-container">
                    <h1 class="app-title">9Myle</h1>
                </div>
                <span class="login-badge">{{loginType === 'business' ? 'Business' : 'Customer'}} Login</span>
                <h2 class="welcome-text">Welcome Back{{shopName ? ' to ' + shopName : ''}}!</h2>
                <p class="subtitle">Sign in to continue your journey</p>
            </div>

            <ng-container *ngIf="loginType === 'business'">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" formControlName="email" class="form-control"
                        [ngClass]="{ 'is-invalid': loginForm.get('email')?.touched && loginForm.get('email')?.invalid }" />
                    <div class="invalid-feedback"
                        *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
                        <div *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</div>
                        <div *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" formControlName="password" class="form-control"
                        [ngClass]="{ 'is-invalid': loginForm.get('password')?.touched && loginForm.get('password')?.invalid }" />
                    <div class="invalid-feedback"
                        *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                        <div *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</div>
                    </div>
                </div>

                <div class="error-message" *ngIf="error">
                    <span class="error-icon">⚠️</span>
                    <span>{{error}}</span>
                </div>

                <button type="submit" [disabled]="loading || loginForm.invalid" class="btn btn-primary">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                    Sign In
                </button>
            </ng-container>

            <ng-container *ngIf="loginType === 'customer'">
                <button type="button" (click)="continueWithGoogle()" class="btn btn-google" [disabled]="loading">
                    <img *ngIf="!loading" src="assets/GoogleG_FullColor_RGB.png" alt="Google" class="google-icon" />
                    <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                    Continue with Google
                </button>
            </ng-container>

            <!-- <button *ngIf="loginType === 'business'" type="button" class="btn btn-create-account"
                (click)="openBusinessRequest()">
                Create New Business
            </button> -->
        </form>
    </div>
</div>
